<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error interno - UTN GolMundial 2026</title>
    <style>

        :root {
            --azul-900: #0f172a;
            --azul-800: #172554;
            --azul-700: #1d4ed8;
            --azul-500: #3b82f6;
            --celeste: #38bdf8;
            --blanco: #ffffff;
            --texto-suave: #cbd5e1;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--blanco);
            background:
                radial-gradient(circle at 12% 18%, rgba(56,189,248,.22), transparent 30%),
                radial-gradient(circle at 88% 82%, rgba(37,99,235,.32), transparent 34%),
                linear-gradient(145deg, #020617 0%, #0f172a 50%, #1e3a8a 100%);
        }

        .tarjeta {
            width: min(760px, 100%);
            padding: 48px;
            text-align: center;
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 26px;
            background: rgba(255,255,255,.08);
            box-shadow: 0 28px 70px rgba(0,0,0,.34);
            backdrop-filter: blur(14px);
        }

        .icono {
            width: 82px;
            height: 82px;
            display: grid;
            place-items: center;
            margin: 0 auto 22px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--azul-700), #0ea5e9);
            box-shadow: 0 14px 34px rgba(14,165,233,.25);
            font-size: 38px;
        }

        .codigo {
            display: inline-block;
            margin-bottom: 14px;
            padding: 7px 13px;
            border-radius: 999px;
            background: rgba(56,189,248,.14);
            color: #bae6fd;
            border: 1px solid rgba(125,211,252,.22);
            font-weight: 800;
            letter-spacing: .5px;
        }

        h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 56px);
            line-height: 1.05;
        }

        p {
            max-width: 600px;
            margin: 18px auto 0;
            color: var(--texto-suave);
            font-size: 17px;
            line-height: 1.7;
        }

        .acciones {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
        }

        .boton {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 20px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 750;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(255,255,255,.08);
            transition: transform .2s ease, background .2s ease;
        }

        .boton:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,.14);
        }

        .boton-principal {
            background: linear-gradient(135deg, var(--azul-700), #0ea5e9);
            border-color: rgba(125,211,252,.4);
        }

        .pie {
            margin-top: 28px;
            color: #94a3b8;
            font-size: 12px;
        }

        @media (max-width: 560px) {
            body { padding: 14px; }
            .tarjeta { padding: 34px 20px; }
            p { font-size: 15px; }
            .acciones { flex-direction: column; }
            .boton { width: 100%; }
        }

    </style>
</head>
<body>
    <main class="tarjeta">
        <div class="icono">⚠️</div>
        <div class="codigo">ERROR 500</div>
        <h1>Ocurrió un error inesperado</h1>
        <p>El sistema no pudo completar la solicitud. Intente nuevamente y, si el problema continúa, revise el registro de WildFly o comuníquese con el administrador.</p>

        <div class="acciones">
            <a class="boton boton-principal" href="/golmundial-estadisticas/">Ir a la portada</a>
            <a class="boton" href="/golmundial-estadisticas/publico/inicio.xhtml">Portal público</a>
            <a class="boton" href="/golmundial-estadisticas/login.xhtml">Iniciar sesión</a>
        </div>

        <div class="pie">UTN GolMundial 2026 · Jakarta EE 10 · WildFly</div>
    </main>
</body>
</html>
