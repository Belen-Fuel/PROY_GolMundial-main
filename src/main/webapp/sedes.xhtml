<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Sedes - UTN GolMundial 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style type="text/css">
        body {
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .barra {
            background-color: #0f172a;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .marca h1 {
            margin: 0;
            font-size: 24px;
        }

        .marca small {
            color: #cbd5e1;
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sesion-usuario {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: bold;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

       .encabezado {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 45%, #2563eb 100%);
            color: white;
            border-radius: 16px;
            padding: 30px 28px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.22);
            position: relative;
            overflow: hidden;
        }

        .encabezado::after {
            content: "";
            position: absolute;
            width: 230px;
            height: 230px;
            right: -80px;
            top: -95px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .encabezado h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .encabezado p {
            margin: 12px 0 0;
            font-size: 14px;
            color: #dbeafe;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .acciones{
            background:#fff;
            border-radius:14px;
            padding:16px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:22px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }
    </style>
</h:head>

<h:body>

    <div class="barra">

    <div class="marca">
        <h1>UTN GolMundial 2026</h1>

        <small>
            Panel administrativo del torneo
        </small>
    </div>

    <h:form id="formMenu">

        <div class="menu">

            <p:button
                    value="Panel"
                    icon="pi pi-home"
                    href="#{request.contextPath}/dashboard.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Partidos"
                    icon="pi pi-calendar"
                    href="#{request.contextPath}/partidos.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Selecciones"
                    icon="pi pi-flag"
                    href="#{request.contextPath}/selecciones.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Sedes"
                    icon="pi pi-map-marker"
                    href="#{request.contextPath}/sedes.xhtml"/>

            <p:button
                    value="Usuarios"
                    icon="pi pi-users"
                    href="#{request.contextPath}/usuarios.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Auditoría"
                    icon="pi pi-search"
                    href="#{request.contextPath}/auditoria.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Reportes"
                    icon="pi pi-chart-bar"
                    href="#{request.contextPath}/reportes.xhtml"
                    styleClass="ui-button-outlined"/>

            <h:panelGroup
                    rendered="#{loginBean.logueado and loginBean.administrador}"
                    layout="block"
                    style="display:inline-flex;
                           align-items:center;
                           gap:8px;">

                <span class="sesion-usuario">
                    <i class="pi pi-user"></i>
                    #{loginBean.usuario.nombre}
                </span>

                <p:commandButton
                        value="Cerrar sesión"
                        icon="pi pi-sign-out"
                        action="#{loginBean.cerrarSesion}"
                        ajax="false"
                        styleClass="ui-button-danger"/>

            </h:panelGroup>

        </div>

    </h:form>

</div>
    <div class="container">

    <div class="encabezado">

        <div>
            <h1>
                <i class="pi pi-map-marker"></i>
                🏟️ Sedes del Mundial 2026
            </h1>

            <p>
                Consulta los estadios oficiales de Estados Unidos, México y Canadá.
            </p>
        </div>

    </div>

    <h:form id="formSedes">

            <!-- Mensajes globales para validar si falta algún campo al guardar -->
            <p:growl id="msjs" showDetail="true" keepAlive="false" />

            <!-- Botón para abrir el diálogo de registro -->
           <!-- Acciones -->
                <div style="display:flex;
                            justify-content:space-between;
                            align-items:center;
                            margin-bottom:15px;
                            flex-wrap:wrap;
                            gap:10px;">

                    <p:button
                            value="Volver al panel"
                            icon="pi pi-home"
                            href="#{request.contextPath}/dashboard.xhtml"
                            styleClass="ui-button-secondary"/>

                    <p:commandButton
                            value="Nueva Sede"
                            icon="pi pi-plus"
                            onclick="PF('dlgSede').show()"
                            type="button"
                            styleClass="ui-button-success"/>

                </div>

            <!-- Tabla adaptativa (responsiva) de PrimeFaces -->
            <p:dataTable id="tablaSedes" var="sede" value="#{sedeBean.sedes}" 
                         reflow="true" rows="10" paginator="true"
                         paginatorPosition="bottom"
                         emptyMessage="No se encontraron sedes cargadas en el sistema.">
                
                <p:column headerText="ID" style="width: 50px; text-align: center;">
                    <h:outputText value="#{sede.id}" />
                </p:column>

                <p:column headerText="Nombre del Estadio">
                    <h:outputText value="#{sede.nombre}" style="font-weight: bold; color: #2a5298;" />
                </p:column>

                <p:column headerText="Ciudad">
                    <h:outputText value="#{sede.ciudad}" />
                </p:column>

                <p:column headerText="País">
                    <h:outputText value="#{sede.pais}" />
                </p:column>

                <p:column headerText="Capacidad" style="text-align: right;">
                    <h:outputText value="#{sede.capacidadAprox}">
                        <f:convertNumber pattern="#,###" />
                    </h:outputText>
                </p:column>

            </p:dataTable>
        </h:form>

        <!-- Diálogo Modal para Registrar Nueva Sede -->
        <p:dialog header="Registrar Nueva Sede" 
                  widgetVar="dlgSede" 
                  modal="true" 
                  responsive="true" 
                  showEffect="fade" 
                  hideEffect="fade"
                  resizable="false">
                  
            <h:form id="formNuevaSede">
                <p:panelGrid columns="2" layout="grid" styleClass="ui-panelgrid-blank" style="margin-bottom: 10px;">
                    
                    <p:outputLabel for="nombre" value="Nombre del Estadio:" />
                    <p:inputText id="nombre" 
                                 value="#{sedeBean.nuevaSede.nombre}" 
                                 required="true" 
                                 requiredMessage="El nombre del estadio es obligatorio" />

                    <p:outputLabel for="ciudad" value="Ciudad:" />
                    <p:inputText id="ciudad" 
                                 value="#{sedeBean.nuevaSede.ciudad}" 
                                 required="true" 
                                 requiredMessage="La ciudad es obligatoria" />

                    <p:outputLabel for="pais" value="País:" />
                    <p:inputText id="pais" 
                                 value="#{sedeBean.nuevaSede.pais}" 
                                 required="true" 
                                 requiredMessage="El país es obligatorio" />

                    <p:outputLabel for="capacidad" value="Capacidad:" />
                    <p:inputNumber id="capacidad"
                                value="#{sedeBean.nuevaSede.capacidadAprox}"
                                decimalPlaces="0"
                                minValue="1"
                                required="true"
                                requiredMessage="La capacidad es obligatoria" />
                                   
                </p:panelGrid>

                <div style="text-align: right; margin-top: 15px;">
                    <p:commandButton value="Cancelar" 
                                     icon="pi pi-times" 
                                     onclick="PF('dlgSede').hide()" 
                                     styleClass="ui-button-secondary" 
                                     type="button"
                                     style="margin-right: .5rem;" />
                                     
                    <p:commandButton value="Guardar" 
                                     icon="pi pi-check" 
                                     actionListener="#{sedeBean.guardarSede}" 
                                     update=":formSedes:tablaSedes :formSedes:msjs @form" 
                                     oncomplete="if (!args.validationFailed) PF('dlgSede').hide()" />
                </div>
            </h:form>
        </p:dialog>
    </div>
</h:body>
</html>
